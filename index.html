<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve Viewer</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #333;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <model-viewer 
        src="minecraft_-_steve.glb" 
        alt="Minecraft Steve 3D Model"
        auto-rotate 
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1" 
        exposure="1"
        environment-image="neutral">
        
        <div class="controls">
            Крути пальцем, чтобы рассмотреть модель
        </div>
    </model-viewer>

</body>
</html>
