<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve 3D Viewer</title>
    <style>
        body { margin: 0; background: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
        model-viewer { width: 100%; height: 90vh; background: #222; --progress-bar-color: #39ff14; }
        #error-log { color: #ff4444; padding: 10px; font-family: monospace; font-size: 12px; background: #000; }
    </style>
</head>
<body>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <model-viewer 
        id="steve-model"
        src="minecraft_-_steve.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        ar
        touch-action="pan-y">
    </model-viewer>

    <div id="error-log">Статус: Ожидание загрузки...</div>

    <script>
        const modelViewer = document.querySelector('#steve-model');
        const log = document.querySelector('#error-log');

        // Проверка на ошибку загрузки
        modelViewer.addEventListener('error', (event) => {
            log.innerHTML = "Ошибка: Файл модели не найден или поврежден. Проверь название файла!";
            console.error(event);
        });

        // Проверка успешной загрузки
        modelViewer.addEventListener('load', () => {
            log.innerHTML = "Статус: Стив успешно загружен!";
            log.style.color = "#39ff14";
        });
    </script>
</body>
</html>
