<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Minecraft SWGoH Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Интерфейс в стиле мобильных стратегий */
        #ui {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
        }
        
        .skill-btn {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .skill-btn:hover:not(:disabled) { transform: scale(1.1); background: #333; }
        .skill-btn:disabled { border-color: #444; color: #444; opacity: 0.5; }

        #log {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px #000;
        }
    </style>
</head>
<body>

    <div id="log">Ожидание загрузки...</div>
    
    <div id="ui">
        <button id="attack-btn" class="skill-btn" onclick="playerAttack()">АТАКА</button>
        <button id="special-btn" class="skill-btn" onclick="playerSpecial()">СПЕЦ</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, player, enemy;
        let isPlayerTurn = true;
        const loader = new GLTFLoader();

        init();
        animate();

        function init() {
            // 1. Сцена
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            // 2. Камера (Вид сзади-сбоку как в SWGoH)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-8, 5, 10); 
            camera.lookAt(2, 1, 0);

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Свет
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            // 5. Окружение (Пол)
            const grid = new THREE.GridHelper(20, 20, 0x333333, 0x111111);
            scene.add(grid);

            // 6. Загрузка моделей
            // Загружаем твоего Стива [cite: 51, 61]
            loadModel('models/steve/scene.gltf', -3, 0, (obj) => {
                player = obj;
                player.rotation.y = Math.PI / 2; // Лицом к врагу
                document.getElementById('log').innerText = "Твой ход";
            }, 0x00ff00);

            // Враг (пока куб, или загрузи вторую модель)
            loadModel('models/zombie/scene.gltf', 3, 0, (obj) => {
                enemy = obj;
                enemy.rotation.y = -Math.PI / 2; // Лицом к игроку
            }, 0xff0000);
        }

        // Универсальная функция: грузит GLTF или создает куб-заглушку, если файла нет
        function loadModel(path, x, z, callback, fallbackColor) {
            loader.load(path, 
                (gltf) => {
                    const model = gltf.scene;
                    model.position.set(x, 0, z);
                    model.scale.set(0.05, 0.05, 0.05); // Корректировка масштаба под сцену [cite: 47]
                    scene.add(model);
                    callback(model);
                },
                undefined,
                () => {
                    // Если модель не найдена, создаем "майнкрафт-человечка" из кубов
                    const group = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: fallbackColor}));
                    body.position.y = 1;
                    group.add(body);
                    group.position.set(x, 0, z);
                    scene.add(group);
                    callback(group);
                }
            );
        }

        // --- ЛОГИКА БОЯ ---

        window.playerAttack = function() {
            if (!isPlayerTurn || !player || !enemy) return;
            isPlayerTurn = false;
            updateUI();

            const startX = player.position.x;
            const targetX = enemy.position.x - 1.5;

            // Анимация рывка вперед
            animateMove(player, targetX, 200, () => {
                document.getElementById('log').innerText = "Удар!";
                // Возврат назад
                setTimeout(() => {
                    animateMove(player, startX, 200, () => {
                        document.getElementById('log').innerText = "Ход противника...";
                        setTimeout(enemyTurn, 1000);
                    });
                }, 200);
            });
        };

        function enemyTurn() {
            const startX = enemy.position.x;
            const targetX = player.position.x + 1.5;

            animateMove(enemy, targetX, 200, () => {
                setTimeout(() => {
                    animateMove(enemy, startX, 200, () => {
                        isPlayerTurn = true;
                        updateUI();
                        document.getElementById('log').innerText = "Твой ход";
                    });
                }, 200);
            });
        }

        // Простая функция анимации перемещения
        function animateMove(obj, targetX, duration, onComplete) {
            const startX = obj.position.x;
            const startTime = performance.now();

            function step() {
                const elapsed = performance.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                obj.position.x = startX + (targetX - startX) * progress;

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    onComplete();
                }
            }
            requestAnimationFrame(step);
        }

        function updateUI() {
            document.getElementById('attack-btn').disabled = !isPlayerTurn;
            document.getElementById('special-btn').disabled = !isPlayerTurn;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
